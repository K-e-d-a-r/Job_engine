<!DOCTYPE html>
<html>
<head>
    <title>AI Job Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4"> AI Job Recommendation System</h1>

    <div class="card p-4 shadow">
        <input type="file" id="cvFile" class="form-control mb-3">
        <button class="btn btn-primary w-100" onclick="uploadCV()">Find Jobs</button>
    </div>

    <div id="results" class="mt-5"></div>

</div>

<script>
async function uploadCV() {
    const fileInput = document.getElementById("cvFile");
    const file = fileInput.files[0];
    const button = document.querySelector("button");

    if (!file) {
        alert("Please upload a CV");
        return;
    }

    //  Show loader
    button.innerHTML = " Processing...";
    button.disabled = true;

    document.getElementById("results").innerHTML = `
        <div class="text-center mt-4">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Analyzing your CV and fetching jobs...</p>
        </div>
    `;

    let formData = new FormData();
    formData.append("file", file);

    try {
        const response = await fetch("http://127.0.0.1:8000/recommend", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        let html = "";

        data.results.forEach(job => {
            html += `
            <div class="card mb-3 shadow">
                <div class="card-body">
                    <h5>${job.title}</h5>
                    <p><strong>Match Score:</strong> ${job.score}</p>
                    <details>
                        <summary>View Description</summary>
                        <p>${job.description}</p>
                    </details>
                </div>
            </div>
            `;
        });

        document.getElementById("results").innerHTML = html;

    } catch (error) {
        document.getElementById("results").innerHTML = `
            <div class="alert alert-danger">
                Error fetching results. Check backend.
            </div>
        `;
    }

    //  Hide loader
    button.innerHTML = "Find Jobs";
    button.disabled = false;
}
</script>

</body>
</html>
