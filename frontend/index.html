<!DOCTYPE html>
<html>
<head>
    <title>AI Job Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">🚀 AI Job Recommendation System</h1>

    <div class="card p-4 shadow">

        <input type="file" id="cvFile" class="form-control mb-3">

        <input type="text" id="title" class="form-control mb-2" placeholder="Job title (e.g. data)">
        <input type="text" id="location" class="form-control mb-2" placeholder="Location (e.g. Berlin)">
        
        <select id="jobType" class="form-control mb-3">
            <option value="">All Types</option>
            <option value="remote">Remote</option>
            <option value="full-time">Full Time</option>
            <option value="part-time">Part Time</option>
        </select>

        <button id="btn" class="btn btn-primary w-100" onclick="uploadCV()">Find Jobs</button>

    </div>

    <div id="results" class="mt-5"></div>

</div>

<script>
async function uploadCV() {

    const file = document.getElementById("cvFile").files[0];
    const button = document.getElementById("btn");

    if (!file) {
        alert("Upload CV first!");
        return;
    }

    // 🔥 Loader start
    button.innerHTML = "⏳ Processing...";
    button.disabled = true;

    document.getElementById("results").innerHTML = `
        <div class="text-center mt-4">
            <div class="spinner-border text-primary"></div>
            <p>Analyzing CV and fetching jobs...</p>
        </div>
    `;

    let formData = new FormData();

    formData.append("file", file);
    formData.append("title", document.getElementById("title").value);
    formData.append("location", document.getElementById("location").value);
    formData.append("job_type", document.getElementById("jobType").value);

    try {
        const response = await fetch("http://127.0.0.1:8000/recommend", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        let html = "";

        data.results.forEach(job => {
            html += `
            <div class="card mb-3 shadow">
                <div class="card-body">
                    <h5>${job.title}</h5>
                    <p><strong>Match Score:</strong> ${job.score}</p>
                    <details>
                        <summary>View Description</summary>
                        <p>${job.description}</p>
                    </details>
                </div>
            </div>
            `;
        });

        document.getElementById("results").innerHTML = html;

    } catch (error) {
        document.getElementById("results").innerHTML = `
            <div class="alert alert-danger">Error connecting to backend</div>
        `;
    }

    // 🔥 Loader stop
    button.innerHTML = "Find Jobs";
    button.disabled = false;
}
// if (data.results.length === 0) {
//     document.getElementById("results").innerHTML = `
//         <div class="alert alert-warning">
//             No jobs found for given filters 
//         </div>
//     `;
//     return;
// }
</script>

</body>
</html>
